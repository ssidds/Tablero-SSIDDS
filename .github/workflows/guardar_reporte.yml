name: Guardar snapshot de reporte

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar reporte.json actualizado
        run: |
          python3 - << 'PYEOF'
          import csv, json, urllib.request, io

          CSV_BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzG6tPMiSKxlPR-SxPh-E55Xvg9xgA54ZzBhLNqx7d4Cxr-ww56eoY5m1xOMoWdwWFQoLzs_Za79Y2/pub"

          # ---- HOJA REPORTE (gid=499814297) ----
          # Columnas: Proyecto(0) | Sub-proyecto(1) | Status(2) | Próximo paso(3) | Accionable(4)
          url = CSV_BASE + "?gid=499814297&single=true&output=csv"
          with urllib.request.urlopen(url) as r:
              content = r.read().decode('utf-8')
          rows = list(csv.reader(io.StringIO(content)))

          reporte = []
          for row in rows[1:]:
              def c(i): return row[i].strip() if i < len(row) else ""
              if not c(0): continue
              reporte.append({
                  "n":   c(0),
                  "sub": c(1),
                  "s":   c(2),
                  "pp":  c(3),
                  "ac":  c(4)
              })

          with open("reporte.json", "w", encoding="utf-8") as f:
              json.dump(reporte, f, ensure_ascii=False)
          print(f"reporte.json: {len(reporte)} proyectos")
          PYEOF

      - name: Guardar snapshot con fecha
        run: |
          DATE=$(date +%Y-%m-%d)
          cp reporte.json reporte_${DATE}.json
          echo "Snapshot: reporte_${DATE}.json"

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reporte.json reporte_*.json
          git diff --cached --quiet || git commit -m "Snapshot reporte $(date '+%d/%m/%Y %H:%M')"
          git push
