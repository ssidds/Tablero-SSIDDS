name: Actualizar datos del tablero

# Cuando se ejecuta:
on:
  schedule:
    - cron: '0 * * * *'      # automatico: cada hora en punto
  workflow_dispatch:          # manual: boton "Run workflow" en la pestana Actions

permissions:
  contents: write             # permiso para guardar datos.json en el repo

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Leer Google Sheet y generar datos.json
        run: |
          python3 - <<'PYEOF'
          import urllib.request, csv, io, json

          # URL del CSV publicado de tu Google Sheet
          URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzG6tPMiSKxlPR-SxPh-E55Xvg9xgA54ZzBhLNqx7d4Cxr-ww56eoY5m1xOMoWdwWFQoLzs_Za79Y2/pub?gid=0&single=true&output=csv"

          req = urllib.request.Request(URL, headers={'User-Agent': 'Mozilla/5.0'})
          raw = urllib.request.urlopen(req).read().decode('utf-8')
          rows = list(csv.reader(io.StringIO(raw)))

          if not rows:
              raise SystemExit("El Sheet no devolvio datos")

          # --- Mapeo por NOMBRE de columna (robusto: no importa el orden) ---
          header = [h.strip().lower() for h in rows[0]]
          def buscar(*opciones):
              for i, h in enumerate(header):
                  for op in opciones:
                      if op in h:
                          return i
              return -1

          iN   = buscar('proyecto')
          iS   = buscar('status', 'estado')
          iA   = buscar('accionable')
          iH   = buscar('proximo hito', 'próximo hito', 'hito y fecha')
          iAC  = buscar('actores')
          iMO  = buscar('monto')
          iTE  = buscar('temat', 'temát')
          iINV = buscar('tipo invers', 'tipo de invers')
          iCO  = buscar('comuna')
          iBA  = buscar('barrio')

          def val(r, i):
              return r[i].strip() if (i >= 0 and i < len(r)) else ""

          out = []
          for r in rows[1:]:
              if not r or val(r, iN) == "" or val(r, iN).lower() == "proyecto":
                  continue
              out.append({
                  "n":  val(r, iN),
                  "s":  val(r, iS),
                  "a":  val(r, iA),
                  "h":  val(r, iH),
                  "ac": val(r, iAC),
                  "mo": val(r, iMO),
                  "te": val(r, iTE),
                  "inv":val(r, iINV),
                  "co": val(r, iCO),
                  "ba": val(r, iBA),
              })

          with open('datos.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=0)

          print(f"OK: {len(out)} proyectos guardados en datos.json")
          PYEOF

      - name: Guardar cambios si hay datos nuevos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add datos.json
          git diff --staged --quiet || git commit -m "Actualizar datos del tablero"
          git push
