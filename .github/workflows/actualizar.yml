name: Actualizar datos del tablero

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Leer Google Sheet y generar datos.json
        run: |
          python3 - <<'PYEOF'
          import urllib.request, csv, io, json

          URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzG6tPMiSKxlPR-SxPh-E55Xvg9xgA54ZzBhLNqx7d4Cxr-ww56eoY5m1xOMoWdwWFQoLzs_Za79Y2/pub?gid=0&single=true&output=csv"

          req = urllib.request.Request(URL, headers={'User-Agent': 'Mozilla/5.0'})
          raw = urllib.request.urlopen(req).read().decode('utf-8')
          rows = list(csv.reader(io.StringIO(raw)))

          if not rows:
              raise SystemExit("El Sheet no devolvio datos")

          # Encabezados exactos del Sheet:
          # 0=Proyecto, 1=Fecha de carga, 2=Status, 3=Pasos/Hitos Cumplidos
          # 4=Accionable Marce, 5=Prox paso, 6=Proximo hito y fecha
          # 7=Actores involucrados, 8=Monto de inversion
          # 9=Etapa, 10=Comuna, 11=Barrio, 12=Tematica, 13=Tipo de inversion

          out = []
          for r in rows[1:]:
              if not r or not r[0].strip() or r[0].strip().lower() == "proyecto":
                  continue
              def v(i):
                  return r[i].strip() if i < len(r) else ""
              out.append({
                  "n":   v(0),
                  "s":   v(2),
                  "a":   v(4),
                  "h":   v(6),
                  "ac":  v(7),
                  "mo":  v(8),
                  "te":  v(12),
                  "inv": v(13),
                  "co":  v(10),
                  "ba":  v(11),
                  "etapa": v(9),
              })

          with open('datos.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=0)

          print(f"OK: {len(out)} proyectos guardados en datos.json")
          PYEOF

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add datos.json
          git diff --staged --quiet || git commit -m "Actualizar datos del tablero"
          git push
