name: Actualizar datos del tablero

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Leer Google Sheet y generar JSONs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, csv, io, json

          BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzG6tPMiSKxlPR-SxPh-E55Xvg9xgA54ZzBhLNqx7d4Cxr-ww56eoY5m1xOMoWdwWFQoLzs_Za79Y2/pub"

          def fetch_csv(gid):
              url = BASE + "?gid=" + gid + "&single=true&output=csv"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              return urllib.request.urlopen(req).read().decode("utf-8")

          # --- TABLERO (proyectos) ---
          raw = fetch_csv("0")
          rows = list(csv.reader(io.StringIO(raw)))
          proyectos = []
          for r in rows[1:]:
              if not r or not r[0].strip() or r[0].strip().lower() == "proyecto":
                  continue
              def v(i): return r[i].strip() if i < len(r) else ""
              proyectos.append({
                  "n":     v(0),
                  "s":     v(2),
                  "a":     v(4),
                  "h":     v(6),
                  "ac":    v(7),
                  "mo":    v(8),
                  "te":    v(12),
                  "inv":   v(13),
                  "co":    v(10),
                  "ba":    v(11),
                  "etapa": v(9),
                  "imp":   v(14),
                  "desc":  v(15),
                  "obj":   v(16),
              })
          with open("datos.json", "w", encoding="utf-8") as f:
              json.dump(proyectos, f, ensure_ascii=False, indent=0)
          print(f"Proyectos: {len(proyectos)}")

          # --- LOGROS ---
          raw2 = fetch_csv("1689415169")
          rows2 = list(csv.reader(io.StringIO(raw2)))
          logros = []
          for r in rows2[1:]:
              if not r or not r[0].strip():
                  continue
              def v2(i): return r[i].strip() if i < len(r) else ""
              logros.append({
                  "fecha":    v2(0),
                  "logro":    v2(1),
                  "proyecto": v2(2),
                  "tematica": v2(3),
              })
          with open("logros.json", "w", encoding="utf-8") as f:
              json.dump(logros, f, ensure_ascii=False, indent=0)
          print(f"Logros: {len(logros)}")
          PYEOF

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add datos.json logros.json
          git diff --staged --quiet || git commit -m "Actualizar datos del tablero"
          git push
